game_id: Gambling
source:
extraction_methodology: Manual
description: |-
  A gambler decides whether to enter a casino. If the gambler stays out, both the gambler and the dealer receive a payoff of 0.

  If the gambler enters, they play a coin toss game against the dealer: both players simultaneously choose either Heads or Tails.

  If the choices match, the gambler receives 1 and the dealer receives -1; otherwise, the dealer receives 1 and the gambler receives -1.
strategic_equivalence_notion: Strong VNM Equivalence
constraint_descriptions:
- Payoffs are stated explicitly, strong VNM is used and one payoff constraint is needed for seeding non-zero payoff for each player.
- TSM constraint.
