game_id: Market_Signalling_Game
source: Shilong Deng, Yongzhao Wang, and Rahul Savani. 2025. From Natural Language to Extensive-Form Game Representations. In 34th International Conference on Autonomous Agents and Multi-Agent Systems (AAMAS).
extraction_methodology: Manual
description: |-
  A new manufacturer plans to enter the market. Chance determines its type: strong with probability 2/3 and weak with probability 1/3.
  The new manufacturer observes its own type and then chooses a signal, either strong or weak, to send to the current manufacturer.
  The current manufacturer observes the signal but not the new manufacturer's actual type, and chooses either to fight or to accommodate.
  The payoffs to the new and current manufacturers respectively are as follows.

  If the new manufacturer is strong and signals strong: fight yields (1, 0), accommodate yields (3, 1).
  If the new manufacturer is strong and signals weak: fight yields (0, 0), accommodate yields (2, 1).
  If the new manufacturer is weak and signals strong: fight yields (0, 2), accommodate yields (2, 1).
  If the new manufacturer is weak and signals weak: fight yields (1, 2), accommodate yields (3, 1).
additional_data: Identical payoffs to reference game
