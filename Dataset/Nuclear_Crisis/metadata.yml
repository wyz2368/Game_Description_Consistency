game_id: Nuclear_Crisis
source: Mihai Manea. Extensive Form Games. MIT OpenCourseWare, March 2, 2016. https://ocw.mit.edu/courses/14-16-strategy-and-information-spring-2016/8aba65347a9edb17b1e718c3c221e42a_MIT14_16S16_Form_Games.pdf (accessed April 20, 2026).
extraction_methodology: Manual
description: |-
  Consider a multi-stage game played between two players, Country A and Country B.

  Country A moves first, choosing whether to escalate (E) or ignore the provocation (I).
  If Country A chooses I, the game ends, and both countries receive a small positive payoff.
  If Country A chooses E, Country B observes this action and chooses whether to back down (B) or escalate (E).
  If Country B chooses B, the game ends: Country A receives an average positive payoff, and Country B loses face and receives a small negative payoff.
  If Country B chooses E, the game enters a nuclear crisis, which is played as a simultaneous-move subgame.
  Both countries simultaneously choose to either retreat (R) or detonate (D).

  The payoffs for this simultaneous subgame are determined as follows:
  - If one country chooses D and the other chooses R, the detonating country receives a big positive payoff, and the retreating country receives a big negative payoff.
  - If both countries choose R, both lose credibility and receive a small negative payoff.
  - If both countries choose D, both suffer a catastrophically big negative payoff.
strategic_equivalence_notion: Order-Preserving Equivalence
constraint_descriptions:
- Check that the signs of the payoffs are correct, that is, whether each payoff is positive or negative as required.
- TSM constraint.
additional_comments: The original lecture note gives the payoff matrix with explicit values. We modify these into payoff relationships to make the translation more challenging.
