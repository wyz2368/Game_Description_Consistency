game_id: Bagwell
source: Bagwell, K., 1995. Commitment and observability in games. Games and Economic Behavior, 8(2), pp.271-280.
extraction_methodology: Manual
description: |-
  Consider next the noisy-leader game.
  In this game, a pure strategy for Player 1 is simply an action, a1 in {C, S}.
  Let the signal received by Player 2 be denoted by phi, and assume for simplicity that phi either takes value C or S.
  The signal technology works as follows:
  Prob(phi = S | S) = 1 - epsilon = Prob(phi = C | C)
  In other words, when Player 1 chooses a particular action, the probability that Player 2 will observe a signal specifying that same action is 1 - epsilon.
  Take epsilon = 0.01.
  Player 2 observes a signal, either C or S, and then chooses an action from {C, S}.

  The resulting payoffs for each player are based on the chosen combination:
  - if both choose S, the payoff is (A, B);
  - if Player 1 chooses S and Player 2 chooses C, it is (W, D);
  - if Player 1 chooses C and Player 2 chooses S, it is (E, W);
  - if both choose C, the payoff is (F, F).

  The payoff rankings from highest to lowest are: E (highest), A, F, W, B, and D (lowest).
  Assign values to each of these payoffs.
strategic_equivalence_notion: Order-preserving Equivalence
constraint_descriptions:
- The payoff values must satisfy A > F and W > B.
additional_comments: We assign a specific value to the probability that Player 2 receives an incorrect signal, so that the chance node is fixed during translation rather than represented by an unknown parameter. This paper gives the payoff matrix with explicit values. We modify these into payoff relationships to make the translation more challenging.
