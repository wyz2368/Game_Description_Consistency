game_id: Tic-Tac-Toe Endgame
source: Tic-tac-toe. Wikipedia. https://en.wikipedia.org/wiki/Tic-tac-toe (accessed April 14, 2026).
extraction_methodology: Manual
description: |-
  Consider a game played between two players, X and O, who alternate turns marking the empty spaces of a 3x3 grid with their respective marks ("x" or "o").

  The player who places three of their marks in a horizontal, vertical, or diagonal row wins the game.
  The winner receives a payoff of 1, and the loser receives a payoff of -1.
  If the grid is completely filled without a winner, the game is a draw and both players receive a payoff of 0.

  Assume the game begins from the following board state, where "e" represents an empty space:

  e | x | e
  x | e | o
  x | e | o

  Player O is the next to move.
strategic_equivalence_notion: Strong VNM Equivalence
constraint_descriptions:
- Payoffs are stated explicitly, strong VNM is used and one payoff constraint is needed for seeding non-zero payoff for each player.
additional_comments: The game description is taken from Wikipedia, as cited in the source. We add an initial board state from the middle of the game to keep the game size suitable for expression in EFG. Moreover, since the description there does not include payoff information, we manually add explicit payoff values to ensure that the description is complete. There is also a simpler version of Tic-Tac-Toe in our dataset with fewer empty spaces on the board.
assets:
  description: description.txt
  script: game.py
  game_file: game.efg
